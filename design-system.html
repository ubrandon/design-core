<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Design System — Design Core</title>
    <link rel="stylesheet" href="styles/shared.css" />
    <link rel="stylesheet" href="styles/ds.css" />
    <link rel="stylesheet" href="styles/canvas-space.css" />
    <link rel="stylesheet" href="styles/app.css" />
    <style>
      .ds-canvas-viewport {
        position: fixed;
        inset: 0;
        top: 52px;
        overflow: hidden;
        cursor: grab;
        background-color: #b8b8b8;
        background-image:
          radial-gradient(rgba(0, 0, 0, 0.04) 1px, transparent 1px),
          radial-gradient(rgba(255, 255, 255, 0.06) 1px, transparent 1px);
        background-size: 24px 24px;
        background-position: 0 0, 12px 12px;
      }
      .ds-canvas-viewport:active {
        cursor: grabbing;
      }
      .ds-canvas-stage {
        position: absolute;
        top: 50%;
        left: 50%;
        transform-origin: 0 0;
        will-change: transform;
        min-width: 1px;
        min-height: 1px;
        padding: 40px 48px;
        display: flex;
        flex-direction: column;
        gap: 40px;
        width: max-content;
      }
      .ds-group {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }
      .ds-group-header {
        font-size: 0.7rem;
        font-weight: 800;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: rgba(0, 0, 0, 0.45);
        padding-bottom: 6px;
        border-bottom: 1px solid rgba(0, 0, 0, 0.1);
      }
      .ds-group-row {
        display: flex;
        flex-direction: row;
        flex-wrap: nowrap;
        gap: 20px;
        align-items: flex-start;
      }
      .ds-section {
        padding: 20px;
        border-radius: var(--radius-lg);
        background: #ffffff;
        border: 1px solid rgba(0, 0, 0, 0.08);
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        min-width: 280px;
        max-width: 420px;
        flex-shrink: 0;
        overflow: visible;

        /* Reset tokens to light mode so components render correctly */
        --bg-0: #ffffff;
        --bg-1: #f8f9fb;
        --surface: rgba(0, 0, 0, 0.03);
        --border: rgba(0, 0, 0, 0.1);
        --text: rgba(0, 0, 0, 0.88);
        --muted: rgba(0, 0, 0, 0.55);
        --muted-2: rgba(0, 0, 0, 0.38);
        --shadow: 0 18px 60px rgba(0, 0, 0, 0.1);
        --shadow-soft: 0 10px 40px rgba(0, 0, 0, 0.06);
        color: var(--text);
      }
      .ds-section-header {
        font-size: 1.1rem;
        font-weight: 700;
        letter-spacing: -0.02em;
        color: rgba(0, 0, 0, 0.8);
        margin-bottom: 20px;
        padding-bottom: 12px;
        border-bottom: 1px solid rgba(0, 0, 0, 0.08);
      }
      .ds-component-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 28px 20px;
      }
      .ds-component-grid--fixed {
        grid-template-columns: repeat(
          var(--fixed-component-columns, 3),
          minmax(0, 1fr)
        );
      }
      .ds-component-item {
        display: flex;
        flex-direction: column;
        gap: 8px;
        min-width: 0;
        overflow: visible;
      }
      .ds-component-label {
        font-size: 0.72rem;
        font-weight: 700;
        color: rgba(0, 0, 0, 0.4);
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }
      .ds-component-preview {
        padding: 12px 0;
        min-height: 40px;
        overflow: visible;
      }
      .zoom-controls {
        position: fixed;
        bottom: 20px;
        right: 20px;
        z-index: 150;
        display: flex;
        gap: 8px;
        align-items: center;
        padding: 8px 12px;
        background: rgba(255, 255, 255, 0.95);
        border-radius: 12px;
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.15);
        border: 1px solid rgba(0, 0, 0, 0.08);
      }
      .zoom-btn {
        width: 36px;
        height: 36px;
        border: 1px solid rgba(0, 0, 0, 0.12);
        border-radius: 8px;
        background: #fff;
        color: #333;
        font-size: 1.1rem;
        font-family: inherit;
        cursor: pointer;
        display: grid;
        place-items: center;
      }
      .zoom-btn:hover {
        background: #f0f0f0;
        border-color: rgba(0, 0, 0, 0.2);
      }
      .zoom-level {
        font-size: 0.75rem;
        font-weight: 700;
        color: #555;
        min-width: 40px;
        text-align: center;
      }
      .zoom-btn--tidy {
        width: auto;
        min-width: auto;
        padding: 0 12px;
        font-size: 0.8rem;
      }
      .zoom-controls__zoom-group {
        display: flex;
        gap: 8px;
        align-items: center;
        padding-left: 12px;
        margin-left: 4px;
        border-left: 1px solid rgba(0, 0, 0, 0.12);
      }
    </style>
  </head>
  <body>
    <div id="viewport" class="ds-canvas-viewport">
      <div id="stage" class="ds-canvas-stage"></div>
    </div>

    <div class="zoom-controls">
      <button class="zoom-btn zoom-btn--tidy" onclick="refreshDS()" title="Reload components to see edits">Refresh</button>
      <div class="zoom-controls__zoom-group">
        <button class="zoom-btn" onclick="zoomBy(-0.04)" title="Zoom out">&minus;</button>
        <span id="zoom-label" class="zoom-level">100%</span>
        <button class="zoom-btn" onclick="zoomBy(0.04)" title="Zoom in">+</button>
        <button class="zoom-btn" onclick="resetView()" title="Reset view" style="font-size:0.8rem">&#8962;</button>
      </div>
    </div>

    <script src="scripts/shared.js"></script>
    <script src="scripts/nav.js"></script>
    <script>
      renderNav({
        breadcrumbs: [{ label: "Design System" }],
        fixed: true,
      });

      const MIN_ZOOM = 0.2;
      const MAX_ZOOM = 2;

      const viewport = document.getElementById("viewport");
      const stage = document.getElementById("stage");

      let panX = 0,
        panY = 0,
        zoom = 1;
      let isPanning = false,
        panStartX = 0,
        panStartY = 0,
        panOriginX = 0,
        panOriginY = 0;
      let spaceHeld = false;

      function applyTransform() {
        stage.style.transform = `translate(${panX}px, ${panY}px) scale(${zoom})`;
        document.getElementById("zoom-label").textContent =
          Math.round(zoom * 100) + "%";
      }

      function zoomBy(delta) {
        zoom = Math.min(MAX_ZOOM, Math.max(MIN_ZOOM, zoom + delta));
        applyTransform();
      }

      function resetView() {
        panX = 0;
        panY = 0;
        zoom = 1;
        applyTransform();
      }

      window.addEventListener("keydown", (e) => {
        if (e.code === "Space") {
          e.preventDefault();
          spaceHeld = true;
        }
      });
      window.addEventListener("keyup", (e) => {
        if (e.code === "Space") {
          e.preventDefault();
          spaceHeld = false;
          if (isPanning) isPanning = false;
        }
      });

      viewport.addEventListener("pointerdown", (e) => {
        isPanning = true;
        panStartX = e.clientX;
        panStartY = e.clientY;
        panOriginX = panX;
        panOriginY = panY;
        viewport.setPointerCapture(e.pointerId);
      });

      viewport.addEventListener("pointermove", (e) => {
        if (isPanning) {
          panX = panOriginX + (e.clientX - panStartX);
          panY = panOriginY + (e.clientY - panStartY);
          applyTransform();
        }
      });

      viewport.addEventListener("pointerup", () => {
        isPanning = false;
      });

      viewport.addEventListener(
        "wheel",
        (e) => {
          e.preventDefault();
          const rect = viewport.getBoundingClientRect();
          const mx = e.clientX - rect.left - rect.width / 2;
          const my = e.clientY - rect.top - rect.height / 2 + 26;

          if (e.ctrlKey || e.metaKey) {
            const delta = e.deltaY > 0 ? -0.06 : 0.06;
            const oldZoom = zoom;
            zoom = Math.min(MAX_ZOOM, Math.max(MIN_ZOOM, zoom + delta));
            panX = mx - (mx - panX) * (zoom / oldZoom);
            panY = my - (my - panY) * (zoom / oldZoom);
          } else {
            panX -= e.deltaX;
            panY -= e.deltaY;
          }
          applyTransform();
        },
        { passive: false },
      );

      let lastTouchDist = 0,
        lastTouchMidX = 0,
        lastTouchMidY = 0;
      viewport.addEventListener(
        "touchstart",
        (e) => {
          if (e.touches.length === 2) {
            const dx = e.touches[0].clientX - e.touches[1].clientX;
            const dy = e.touches[0].clientY - e.touches[1].clientY;
            lastTouchDist = Math.hypot(dx, dy);
            lastTouchMidX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
            lastTouchMidY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
          }
        },
        { passive: true },
      );

      viewport.addEventListener(
        "touchmove",
        (e) => {
          if (e.touches.length === 2) {
            e.preventDefault();
            const dx = e.touches[0].clientX - e.touches[1].clientX;
            const dy = e.touches[0].clientY - e.touches[1].clientY;
            const dist = Math.hypot(dx, dy);
            const midX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
            const midY = (e.touches[0].clientY + e.touches[1].clientY) / 2;

            panX += midX - lastTouchMidX;
            panY += midY - lastTouchMidY;
            zoom = Math.min(
              MAX_ZOOM,
              Math.max(MIN_ZOOM, zoom * (dist / lastTouchDist)),
            );

            lastTouchDist = dist;
            lastTouchMidX = midX;
            lastTouchMidY = midY;
            applyTransform();
          }
        },
        { passive: false },
      );

      async function loadDesignSystem() {
        const bust = "?t=" + Date.now();
        const res = await fetch("data/design-system/registry.json" + bust);
        const registry = await res.json();
        const groups = registry.groups || [{ id: "default", name: "Components" }];
        const byGroup = new Map();
        for (const g of groups) byGroup.set(g.id, []);
        for (const cat of registry.categories) {
          const gid = cat.group || "default";
          if (!byGroup.has(gid)) byGroup.set(gid, []);
          byGroup.get(gid).push(cat);
        }

        const groupHtml = [];

        for (const g of groups) {
          const cats = byGroup.get(g.id) || [];
          if (cats.length === 0) continue;

          const sections = [];
          for (const cat of cats) {
            const layout =
              typeof cat.layout === "string"
                ? { mode: cat.layout }
                : cat.layout || {};
            const isRow = layout.mode === "row";
            const gridClass = isRow
              ? "ds-component-grid ds-component-grid--fixed"
              : "ds-component-grid";
            const gridStyle = isRow
              ? 'style="--fixed-component-columns:3"'
              : "";
            const comps = [];
            for (const comp of cat.components) {
              try {
                const r = await fetch("data/design-system/components/" + comp.file + bust);
                const content = await r.text();
                comps.push({ label: comp.label, content });
              } catch {
                comps.push({
                  label: comp.label,
                  content: '<div class="empty-state">Could not load ' + comp.file + "</div>",
                });
              }
            }
            sections.push(`
              <section class="ds-section">
                <h2 class="ds-section-header">${cat.name}</h2>
                <div class="${gridClass}" ${gridStyle}>
                  ${comps.map((c) => `
                    <div class="ds-component-item">
                      <span class="ds-component-label">${c.label}</span>
                      <div class="ds-component-preview">${c.content}</div>
                    </div>
                  `).join("")}
                </div>
              </section>
            `);
          }

          groupHtml.push(`
            <div class="ds-group ds-group--${g.id}">
              <h2 class="ds-group-header">${g.name}</h2>
              <div class="ds-group-row">${sections.join("")}</div>
            </div>
          `);
        }

        stage.innerHTML = groupHtml.join("");
        applyTransform();
      }

      function refreshDS() {
        loadDesignSystem();
      }

      loadDesignSystem();
    </script>
  </body>
</html>
