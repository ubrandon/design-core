<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prototype — Design Core</title>
  <link rel="stylesheet" href="styles/shared.css">
  <link rel="stylesheet" href="styles/ds.css">
  <link rel="stylesheet" href="styles/app.css">
  <style>
    .proto-meta {
      width: 100%;
      margin-left: auto;
      margin-right: auto;
      flex-shrink: 0;
    }
    .phone-frame--desktop {
      width: 1024px;
      height: 768px;
      border-radius: 12px;
    }
    .phone-frame--desktop .phone-iframe {
      width: 1024px;
      height: 768px;
    }
    .phone-frame--online {
      width: 1280px;
      height: 800px;
      border-radius: 12px;
    }
    .phone-frame--online .phone-iframe {
      width: 1280px;
      height: 800px;
    }
    .phone-frame--responsive {
      width: 90vw;
      max-width: 1200px;
      height: 80vh;
      border-radius: 12px;
    }
    .phone-frame--responsive .phone-iframe {
      width: 100%;
      height: 100%;
    }
    body.is-embed .site-nav,
    body.is-embed .proto-meta { display: none !important; }
    body.is-embed .preview-page {
      min-height: 100vh;
      padding: 24px;
      padding-top: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--bg-1, #f8f9fb);
    }
    body.is-embed .phone-frame-wrap {
      display: flex;
      justify-content: center;
    }
    body.is-embed-fullscreen .preview-page {
      padding: 0;
      min-height: 100vh;
      display: block;
      background: none;
    }
    body.is-embed-fullscreen .phone-frame-wrap {
      display: block;
    }
    body.is-embed-fullscreen #proto-container {
      width: 100vw !important;
      height: 100vh !important;
      border-radius: 0 !important;
      border: none !important;
      box-shadow: none !important;
    }
    body.is-embed-fullscreen #proto-frame {
      width: 100% !important;
      height: 100% !important;
    }
    .proto-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 0 16px;
    }
    .proto-bar__sep {
      width: 1px;
      align-self: center;
      height: 24px;
      background: rgba(255, 255, 255, 0.12);
      flex-shrink: 0;
      margin: 0 4px;
    }
    /* Shared chrome height: “View results” used smaller padding/font than pill buttons */
    .proto-bar__btn,
    .proto-bar__tested {
      box-sizing: border-box;
      min-height: 36px;
      justify-content: center;
    }
    .proto-bar__btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: rgba(255, 255, 255, 0.06);
      color: rgba(255, 255, 255, 0.88);
      font-family: inherit;
      font-size: 0.8rem;
      font-weight: 650;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      text-decoration: none;
      white-space: nowrap;
      line-height: 1;
    }
    .proto-bar__btn:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.24);
    }
    .proto-bar__btn svg {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
    }
    .proto-bar__btn--primary {
      background: linear-gradient(135deg, rgba(var(--neon-blue-rgb),0.85), rgba(var(--neon-teal-rgb),0.7));
      border-color: rgba(0,0,0,0.08);
      color: #fff;
    }
    .proto-bar__btn--primary:hover {
      background: linear-gradient(135deg, rgba(var(--neon-blue-rgb),0.95), rgba(var(--neon-teal-rgb),0.85));
    }
    .proto-bar__btn--primary.is-copied {
      background: linear-gradient(135deg, rgba(var(--neon-teal-rgb),0.95), rgba(var(--neon-teal-rgb),0.82));
    }
    .proto-bar__btn--danger {
      color: rgba(255,120,120,0.9);
      border-color: rgba(255,120,120,0.18);
    }
    .proto-bar__btn--danger:hover {
      background: rgba(255,100,100,0.12);
      border-color: rgba(255,120,120,0.35);
    }
    .proto-bar__btn[hidden] { display: none !important; }
    .proto-bar__tested {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 999px;
      background: rgba(var(--neon-teal-rgb), 0.14);
      border: 1px solid rgba(var(--neon-teal-rgb), 0.35);
      color: var(--neon-teal);
      font-size: 0.8rem;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      white-space: nowrap;
      text-decoration: none;
      transition: background 0.15s;
      cursor: pointer;
      line-height: 1;
    }
    .proto-bar__tested:hover {
      background: rgba(var(--neon-teal-rgb), 0.22);
    }
    .proto-bar__tested svg {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
    }
    .proto-bar__tested[hidden] { display: none !important; }
    .proto-bar__cluster-actions {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
  </style>
</head>
<body>
  <div class="preview-page">
    <div class="proto-meta">
      <div class="proto-bar" role="toolbar" aria-label="Prototype actions">
        <a
          id="proto-tested-link"
          class="proto-bar__tested"
          target="_blank"
          rel="noopener noreferrer"
          title="Open usability test results"
          hidden
        >
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
          View results
        </a>
        <button type="button" class="proto-bar__btn" id="btn-open-proto-test-modal" title="Paste a link to your test results" hidden>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 17H7A5 5 0 0 1 7 7h2"/><path d="M15 7h2a5 5 0 1 1 0 10h-2"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
          <span id="proto-test-btn-label">Add results link</span>
        </button>
        <span class="proto-bar__sep"></span>
        <button type="button" class="proto-bar__btn proto-bar__btn--primary" id="copy-proto-link" title="Copy a shareable link to this prototype">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          <span>Share prototype</span>
        </button>
        <span class="proto-bar__sep"></span>
        <button
          type="button"
          class="proto-bar__btn proto-bar__btn--danger"
          id="btn-delete-prototype"
          title="Delete this prototype and its files"
          hidden
        >
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
          Delete
        </button>
      </div>
    </div>
    <div class="phone-frame-wrap">
      <div id="proto-container" class="phone-frame">
        <iframe id="proto-frame" class="phone-iframe" sandbox="allow-scripts allow-same-origin"></iframe>
      </div>
    </div>
  </div>

  <div id="proto-test-link-overlay" class="tool-modal-overlay" hidden>
    <div
      class="tool-modal"
      role="dialog"
      aria-modal="true"
      aria-labelledby="proto-test-modal-title"
    >
      <div class="tool-modal__header">
        <h2 id="proto-test-modal-title" class="tool-modal__title">
          Usability test link
        </h2>
        <button
          type="button"
          class="tool-modal__close"
          id="proto-test-modal-close"
          aria-label="Close"
        >
          &times;
        </button>
      </div>
      <div class="tool-form" style="margin-top: 0">
        <div class="tool-form__row">
          <label class="tool-form__label" for="proto-external-test-url"
            >Results URL</label
          >
          <input
            type="text"
            id="proto-external-test-url"
            class="tool-form__input"
            inputmode="url"
            autocomplete="off"
            spellcheck="false"
            placeholder="https://… (Maze, UserTesting, etc.)"
          />
          <p class="tool-form__hint">
            Saved as <code>externalTestUrl</code> in <code>meta.json</code>.
            <strong>Tested</strong> appears only for a full <code>http://</code>
            or <code>https://</code> URL (e.g. Maze or UserTesting).
          </p>
        </div>
        <div class="tool-form__actions">
          <button type="button" class="btn-tool" id="proto-test-modal-cancel">
            Cancel
          </button>
          <button type="button" class="btn-tool" id="proto-clear-test-link">
            Remove link
          </button>
          <button
            type="button"
            class="btn-tool btn-tool--primary"
            id="proto-save-test-link"
          >
            Save
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="scripts/shared.js"></script>
  <script src="scripts/nav.js"></script>
  <script src="scripts/live-reload.js"></script>
  <script>
    const projectId = getParam("project");
    const protoId = getParam("proto");
    const isEmbed = getParam("view") === "embed";

    if (!projectId || !protoId) {
      // Surface a hint before bouncing so the user knows why they landed back on Home.
      try { sessionStorage.setItem("design-core-redirect-hint", "Prototype link was missing a project or prototype id."); } catch (_) {}
      window.location.href = "index.html";
    }

    if (isEmbed) document.body.classList.add("is-embed");

    const basePath = "data/projects/" + projectId + "/prototypes/" + protoId + "/";

    function currentPrototypeHashForShare() {
      try {
        var ih = protoFrame.contentWindow && protoFrame.contentWindow.location.hash;
        if (ih && ih !== "#") return ih;
      } catch (e) {}
      var ph = window.location.hash;
      if (ph && ph !== "#") return ph;
      return "";
    }

    var _protoHashPollTimer = null;

    function stopProtoHashPoll() {
      if (_protoHashPollTimer != null) {
        clearInterval(_protoHashPollTimer);
        _protoHashPollTimer = null;
      }
    }

    function syncParentHashFromIframe() {
      try {
        var iw = protoFrame.contentWindow;
        if (!iw) return;
        var h = iw.location.hash || "";
        if ((window.location.hash || "") === h) return;
        var url = new URL(window.location.href);
        url.hash = h;
        history.replaceState(null, "", url.href);
      } catch (e) {}
    }

    function onProtoIframeHashChange() {
      syncParentHashFromIframe();
    }

    function scheduleProtoHashSyncBurst() {
      [0, 80, 200, 500, 1200].forEach(function (ms) {
        setTimeout(syncParentHashFromIframe, ms);
      });
    }

    function startProtoHashPoll() {
      stopProtoHashPoll();
      _protoHashPollTimer = setInterval(syncParentHashFromIframe, 350);
    }

    if (!isEmbed) {
      loadSiteConfig().then(() => {
        renderNav({
          breadcrumbs: [
            { label: projectId, href: "project.html?id=" + projectId, id: "nav-project" },
            { label: protoId, id: "nav-proto" },
          ],
        });
        const copyProtoBtn = document.getElementById("copy-proto-link");
        if (copyProtoBtn) {
          copyProtoBtn.addEventListener("click", (e) => {
            e.preventDefault();
            var url = prototypeUrl(projectId, protoId, currentPrototypeHashForShare());
            navigator.clipboard.writeText(url).then(() => {
              var label = copyProtoBtn.querySelector("span") || copyProtoBtn.lastChild;
              var origText = label.textContent;
              label.textContent = "Copied!";
              copyProtoBtn.classList.add("is-copied");
              setTimeout(() => { label.textContent = origText; copyProtoBtn.classList.remove("is-copied"); }, 1500);
            }).catch(() => { showToast("Could not copy link"); });
          });
        }
      });
    }

    if (!isEmbed) {
      fetchJSON("data/projects/" + projectId + "/project.json")
        .then(data => {
          var el = document.getElementById("nav-project");
          if (el) el.textContent = data.name;
        })
        .catch(() => {});
    }

    var toolPageNames = ["index.html", "project.html", "canvas.html", "prototype.html", "design-system.html", "captures.html"];

    function isToolPage(url) {
      try {
        var pathname = new URL(url, location.href).pathname;
        var segments = pathname.replace(/^\/+/, "").split("/");
        if (segments.length !== 1) return false;
        return toolPageNames.indexOf(segments[0]) !== -1;
      } catch (e) {
        return false;
      }
    }

    function showProtoError() {
      stopProtoHashPoll();
      var container = document.getElementById("proto-container");
      container.innerHTML =
        '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;padding:32px;text-align:center;font-family:var(--font-body,system-ui,sans-serif);background:var(--bg-0,#fff);">' +
          '<div style="font-size:1.5rem;margin-bottom:8px;">&#9888;&#65039;</div>' +
          '<p style="font-weight:700;font-size:1rem;margin:0 0 8px;color:var(--text,#0f172a);">Prototype failed to load</p>' +
          '<p style="font-size:0.85rem;color:var(--muted,#64748b);max-width:320px;margin:0;line-height:1.5;">' +
            'The prototype redirected to a Design Core page instead of rendering its own content. ' +
            'Check that the prototype\'s <code>index.html</code> does not import <code>scripts/shared.js</code> or redirect to <code>index.html</code>.' +
          '</p>' +
        '</div>';
    }

    var protoFrame = document.getElementById("proto-frame");

    protoFrame.addEventListener("load", function () {
      try {
        var frameUrl = protoFrame.contentWindow.location.href;
        if (isToolPage(frameUrl)) {
          showProtoError();
          return;
        }
      } catch (e) {}
      try {
        var iw = protoFrame.contentWindow;
        if (!iw) return;
        iw.removeEventListener("hashchange", onProtoIframeHashChange);
        iw.addEventListener("hashchange", onProtoIframeHashChange);
        syncParentHashFromIframe();
        scheduleProtoHashSyncBurst();
        startProtoHashPoll();
      } catch (e) {}
    });

    function applyMetaLabels(data) {
      const name = data.name || protoId;
      document.title = name + " — Design Core";
      var navProto = document.getElementById("nav-proto");
      if (navProto) navProto.textContent = name;
      const rawTest = prototypeExternalTestRaw(data);
      const testHref = prototypeExternalTestUrl(data);
      const testedLink = document.getElementById("proto-tested-link");
      if (testedLink) {
        if (testHref) {
          testedLink.href = testHref;
          testedLink.hidden = false;
        } else {
          testedLink.removeAttribute("href");
          testedLink.hidden = true;
        }
      }
      const urlInput = document.getElementById("proto-external-test-url");
      const testOverlay = document.getElementById("proto-test-link-overlay");
      if (urlInput && (!testOverlay || testOverlay.hidden)) {
        urlInput.value = rawTest;
      }
      var btnLabel = document.getElementById("proto-test-btn-label");
      if (btnLabel) {
        btnLabel.textContent = rawTest ? "Edit results link" : "Add results link";
      }
    }

    function applyIframeFromMeta(data) {
      var bust =
        data.updatedAt != null && String(data.updatedAt).trim() !== ""
          ? String(data.updatedAt).trim()
          : data.cacheKey != null && String(data.cacheKey).trim() !== ""
            ? String(data.cacheKey).trim()
            : "";
      var src = basePath + "index.html" + (bust !== "" ? "?v=" + encodeURIComponent(bust) : "");
      var ph = window.location.hash;
      if (ph && ph !== "#") src += ph;
      if (isToolPage(src)) {
        showProtoError();
      } else {
        protoFrame.src = src;
      }
    }

    function refreshProtoMetaFromDisk() {
      return fetchJSON(basePath + "meta.json")
        .then((data) => {
          applyMetaLabels(data);
          applyIframeFromMeta(data);
          return data;
        })
        .catch(() => {
          const fallback = { name: protoId, description: "" };
          applyMetaLabels(fallback);
          var src = basePath + "index.html";
          var ph0 = window.location.hash;
          if (ph0 && ph0 !== "#") src += ph0;
          if (isToolPage(src)) showProtoError();
          else protoFrame.src = src;
          return fallback;
        });
    }

    refreshProtoMetaFromDisk();

    if (!isEmbed) {
      isLocalToolServer().then((on) => {
        const btnOpen = document.getElementById("btn-open-proto-test-modal");
        const btnDelete = document.getElementById("btn-delete-prototype");
        const overlay = document.getElementById("proto-test-link-overlay");
        const input = document.getElementById("proto-external-test-url");
        if (btnOpen) btnOpen.hidden = !on;
        if (btnDelete) btnDelete.hidden = !on;
        if (btnDelete && on) {
          btnDelete.addEventListener("click", () => {
            if (
              !confirm(
                "Delete this prototype and all files in its folder?",
              )
            )
              return;
            postProjectAdmin({
              action: "delete-prototype",
              projectId,
              id: protoId,
            })
              .then(() => {
                showToast("Prototype deleted");
                window.location.href =
                  "project.html?id=" + encodeURIComponent(projectId);
              })
              .catch((err) =>
                showToast(err.message || "Could not delete"),
              );
          });
        }
        if (!on || !overlay || !input) return;

        const metaPutPath =
          "data/projects/" +
          projectId +
          "/prototypes/" +
          protoId +
          "/meta.json";

        function closeTestLinkModal() {
          overlay.hidden = true;
          fetchJSON(basePath + "meta.json")
            .catch(() => ({}))
            .then((m) => {
              input.value = prototypeExternalTestRaw(m);
            });
        }

        function openTestLinkModal() {
          fetchJSON(basePath + "meta.json")
            .catch(() => ({}))
            .then((m) => {
              input.value = prototypeExternalTestRaw(m);
              overlay.hidden = false;
              input.focus();
            });
        }

        function persistExternalTestUrl(trimmed) {
          return fetchJSON(basePath + "meta.json")
            .catch(() => ({}))
            .then((existing) => {
              const next = { ...existing };
              if (trimmed) next.externalTestUrl = trimmed;
              else delete next.externalTestUrl;
              return putDataJson(metaPutPath, next);
            })
            .then(() => {
              overlay.hidden = true;
              return refreshProtoMetaFromDisk();
            })
            .then(() => {
              if (
                trimmed &&
                !prototypeExternalTestUrl({ externalTestUrl: trimmed })
              ) {
                showToast(
                  "Saved. Use a full https://… URL to show Tested on this page.",
                );
              } else {
                showToast("Saved");
              }
            })
            .catch((err) => showToast(err.message || "Could not save"));
        }

        btnOpen.addEventListener("click", openTestLinkModal);
        document
          .getElementById("proto-test-modal-close")
          .addEventListener("click", closeTestLinkModal);
        document
          .getElementById("proto-test-modal-cancel")
          .addEventListener("click", closeTestLinkModal);
        overlay.addEventListener("click", (e) => {
          if (e.target === overlay) closeTestLinkModal();
        });
        document
          .getElementById("proto-save-test-link")
          .addEventListener("click", () => {
            persistExternalTestUrl(input.value.trim());
          });
        document
          .getElementById("proto-clear-test-link")
          .addEventListener("click", () => {
            persistExternalTestUrl("");
          });
      });
    }

    fetchJSON("data/projects/" + projectId + "/prototypes/index.json")
      .then(data => {
        var proto = data.prototypes.find(p => p.id === protoId);
        if (proto && proto.device) {
          var device = proto.device.toLowerCase();
          var container = document.getElementById("proto-container");
          if (device === "desktop") {
            container.classList.add("phone-frame--desktop");
          } else if (device === "online") {
            container.classList.add("phone-frame--online");
          } else if (device === "responsive") {
            container.classList.add("phone-frame--responsive");
          }
          if (isEmbed && (device === "desktop" || device === "online" || device === "responsive")) {
            document.body.classList.add("is-embed-fullscreen");
          }
        }
      })
      .catch(() => {});

    /* ── Live reload ── */
    window.__onDataChanged = function(paths) {
      const protoPrefix = "data/projects/" + projectId + "/prototypes/" + protoId + "/";
      const relevant = paths.length === 0 || paths.some(p => p.startsWith(protoPrefix));
      if (relevant && protoFrame.src) {
        var hashPart = "";
        try {
          var parsed = new URL(protoFrame.src, window.location.href);
          if (parsed.hash && parsed.hash !== "#") hashPart = parsed.hash;
        } catch (e) {}
        if (!hashPart) {
          try {
            var ch = protoFrame.contentWindow && protoFrame.contentWindow.location.hash;
            if (ch && ch !== "#") hashPart = ch;
          } catch (err) {}
        }
        var withoutQueryHash = protoFrame.src.split("#")[0].replace(/[?#].*$/, "");
        protoFrame.src = withoutQueryHash + "?t=" + Date.now() + hashPart;
      }
      const metaTouched =
        paths.length === 0 ||
        paths.some((p) => p === protoPrefix + "meta.json");
      if (metaTouched) refreshProtoMetaFromDisk().catch(() => {});
    };
  </script>
</body>
</html>
