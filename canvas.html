<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Canvas — Design Core</title>
  <link rel="stylesheet" href="styles/shared.css">
  <link rel="stylesheet" href="styles/ds.css">
  <link rel="stylesheet" href="styles/canvas-space.css">
  <link rel="stylesheet" href="styles/app.css">
  <style>
    .zoom-controls {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 150;
      display: flex;
      gap: 10px;
      align-items: center;
      padding: 8px 12px;
      background: rgba(255, 255, 255, 0.95);
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.15);
      border: 1px solid rgba(0, 0, 0, 0.08);
    }
    .zoom-controls__zoom-group {
      display: flex;
      gap: 8px;
      align-items: center;
      padding-left: 12px;
      margin-left: 4px;
      border-left: 1px solid rgba(0, 0, 0, 0.12);
    }
    .zoom-btn {
      width: 36px;
      height: 36px;
      border: 1px solid rgba(0, 0, 0, 0.12);
      border-radius: 8px;
      background: #fff;
      color: #333;
      font-size: 1.1rem;
      font-family: inherit;
      cursor: pointer;
      display: grid;
      place-items: center;
    }
    .zoom-btn:hover {
      background: #f0f0f0;
      border-color: rgba(0, 0, 0, 0.2);
    }
    .zoom-level {
      font-size: 0.75rem;
      font-weight: 700;
      color: #555;
      min-width: 40px;
      text-align: center;
    }
    .zoom-btn--tidy {
      width: auto;
      min-width: auto;
      padding: 0 12px;
      font-size: 0.8rem;
    }
    .canvas-card-body {
      overflow: hidden;
      max-height: none;
    }
  </style>
</head>
<body>

  <div id="viewport" class="canvas-space-viewport">
    <div id="stage" class="canvas-space-stage"></div>
  </div>

  <div class="zoom-controls">
    <button class="zoom-btn zoom-btn--tidy" onclick="tidyLayout()" title="Tidy layout">Tidy</button>
    <button class="zoom-btn zoom-btn--tidy" onclick="refreshScreens()" title="Reload screens to see edits">Refresh</button>
    <div class="zoom-controls__zoom-group">
      <button class="zoom-btn" onclick="zoomBy(-0.04)" title="Zoom out">&minus;</button>
      <span id="zoom-label" class="zoom-level">100%</span>
      <button class="zoom-btn" onclick="zoomBy(0.04)" title="Zoom in">+</button>
      <button class="zoom-btn" onclick="resetView()" title="Reset view" style="font-size:0.8rem;">&#8962;</button>
    </div>
  </div>

  <script src="scripts/shared.js"></script>
  <script src="scripts/nav.js"></script>
  <script>
    const CARD_GAP = 40;
    const POLL_INTERVAL_MS = 2000;
    const MIN_ZOOM = 0.2;
    const MAX_ZOOM = 2;

    const projectId = getParam("project");
    if (!projectId) window.location.href = "index.html";

    renderNav({
      breadcrumbs: [
        { label: projectId, href: "project.html?id=" + projectId, id: "project-link" },
        { label: "Canvas" },
      ],
      fixed: true,
    });

    const viewport = document.getElementById("viewport");
    const stage = document.getElementById("stage");

    let panX = 0, panY = 0, zoom = 1;
    let isPanning = false, panStartX = 0, panStartY = 0, panOriginX = 0, panOriginY = 0;
    let isDragging = false, dragCard = null, dragOffX = 0, dragOffY = 0;
    let spaceHeld = false;

    let screens = [];

    function applyTransform() {
      stage.style.transform = `translate(${panX}px, ${panY}px) scale(${zoom})`;
      document.getElementById("zoom-label").textContent = Math.round(zoom * 100) + "%";
    }

    function zoomBy(delta) {
      zoom = Math.min(MAX_ZOOM, Math.max(MIN_ZOOM, zoom + delta));
      applyTransform();
    }

    function resetView() {
      panX = 0;
      panY = 0;
      zoom = 1;
      applyTransform();
    }

    function tidyLayout() {
      let x = 0;
      screens.forEach((s, i) => {
        const card = document.getElementById("card-" + i);
        const w = s.width || 390;
        s.x = x;
        s.y = 0;
        if (card) {
          card.style.left = s.x + "px";
          card.style.top = s.y + "px";
        }
        x += w + CARD_GAP;
      });
    }

    function loadCanvas() {
      fetch("data/projects/" + projectId + "/canvas.json?t=" + Date.now())
        .then(r => r.json())
        .then(data => {
          let autoX = 0;
          const next = data.screens.map((s, i) => {
            const w = s.width || 390;
            const x = s.x != null ? s.x : autoX;
            const y = s.y != null ? s.y : 0;
            autoX = x + w + CARD_GAP;
            return { file: s.file, x, y, width: w };
          });
          const structureSame = screens.length === next.length && next.every((n, i) =>
            screens[i] && n.file === screens[i].file && n.width === screens[i].width
          );
          if (!structureSame) {
            screens = next;
            renderCards();
          }
        })
        .catch(() => {});
    }

    function refreshScreens() {
      const t = Date.now();
      screens.forEach((s, i) => {
        const iframe = document.querySelector("#card-" + i + " iframe");
        if (iframe) {
          const url = new URL("data/projects/" + projectId + "/screens/" + s.file + "?t=" + t, window.location.href).href;
          iframe.src = url;
        }
      });
    }

    window.addEventListener("keydown", (e) => {
      if (e.code === "Space") { e.preventDefault(); spaceHeld = true; }
    });
    window.addEventListener("keyup", (e) => {
      if (e.code === "Space") { e.preventDefault(); spaceHeld = false; if (isPanning) isPanning = false; }
    });

    viewport.addEventListener("pointerdown", (e) => {
      if (spaceHeld) {
        isPanning = true;
        panStartX = e.clientX;
        panStartY = e.clientY;
        panOriginX = panX;
        panOriginY = panY;
        viewport.setPointerCapture(e.pointerId);
        return;
      }
      if (e.target !== viewport && !e.target.closest(".canvas-space-viewport")) return;
      if (e.target.closest(".canvas-card")) return;
      isPanning = true;
      panStartX = e.clientX;
      panStartY = e.clientY;
      panOriginX = panX;
      panOriginY = panY;
      viewport.setPointerCapture(e.pointerId);
    });

    viewport.addEventListener("pointermove", (e) => {
      if (isPanning) {
        panX = panOriginX + (e.clientX - panStartX);
        panY = panOriginY + (e.clientY - panStartY);
        applyTransform();
      }
      if (isDragging && dragCard) {
        const rect = viewport.getBoundingClientRect();
        const stageX = (e.clientX - rect.left - panX - rect.width / 2) / zoom;
        const stageY = (e.clientY - rect.top - panY - rect.height / 2 + 26) / zoom;
        const newX = stageX - dragOffX;
        const newY = stageY - dragOffY;
        dragCard.el.style.left = newX + "px";
        dragCard.el.style.top = newY + "px";
        dragCard.screen.x = newX;
        dragCard.screen.y = newY;
      }
    });

    viewport.addEventListener("pointerup", () => {
      isPanning = false;
      if (isDragging) {
        isDragging = false;
        dragCard = null;
        viewport.classList.remove("dragging-card");
      }
    });

    viewport.addEventListener("wheel", (e) => {
      e.preventDefault();
      const rect = viewport.getBoundingClientRect();
      const mx = e.clientX - rect.left - rect.width / 2;
      const my = e.clientY - rect.top - rect.height / 2 + 26;

      if (e.ctrlKey || e.metaKey) {
        const delta = e.deltaY > 0 ? -0.06 : 0.06;
        const oldZoom = zoom;
        zoom = Math.min(MAX_ZOOM, Math.max(MIN_ZOOM, zoom + delta));
        panX = mx - (mx - panX) * (zoom / oldZoom);
        panY = my - (my - panY) * (zoom / oldZoom);
      } else {
        panX -= e.deltaX;
        panY -= e.deltaY;
      }
      applyTransform();
    }, { passive: false });

    let lastTouchDist = 0, lastTouchMidX = 0, lastTouchMidY = 0;
    viewport.addEventListener("touchstart", (e) => {
      if (e.touches.length === 2) {
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        lastTouchDist = Math.hypot(dx, dy);
        lastTouchMidX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
        lastTouchMidY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
      }
    }, { passive: true });

    viewport.addEventListener("touchmove", (e) => {
      if (e.touches.length === 2) {
        e.preventDefault();
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        const dist = Math.hypot(dx, dy);
        const midX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
        const midY = (e.touches[0].clientY + e.touches[1].clientY) / 2;

        panX += midX - lastTouchMidX;
        panY += midY - lastTouchMidY;
        zoom = Math.min(MAX_ZOOM, Math.max(MIN_ZOOM, zoom * (dist / lastTouchDist)));

        lastTouchDist = dist;
        lastTouchMidX = midX;
        lastTouchMidY = midY;
        applyTransform();
      }
    }, { passive: false });

    function startDrag(e, idx) {
      if (spaceHeld) return;
      e.stopPropagation();
      isDragging = true;
      viewport.classList.add("dragging-card");
      const card = document.getElementById("card-" + idx);
      const rect = viewport.getBoundingClientRect();
      const stageX = (e.clientX - rect.left - panX - rect.width / 2) / zoom;
      const stageY = (e.clientY - rect.top - panY - rect.height / 2 + 26) / zoom;
      dragOffX = stageX - screens[idx].x;
      dragOffY = stageY - screens[idx].y;
      dragCard = { el: card, screen: screens[idx] };
      viewport.setPointerCapture(e.pointerId);
    }

    loadCanvas();
    setInterval(loadCanvas, POLL_INTERVAL_MS);

    function renderCards() {
      const bust = "?t=" + Date.now();
      stage.innerHTML = screens.map((s, i) => `
        <div class="canvas-card" id="card-${i}"
             style="left:${s.x}px; top:${s.y}px; width:${s.width}px;"
             onpointerdown="startDrag(event, ${i})">
          <div class="canvas-card-body">
            <iframe src="data/projects/${projectId}/screens/${s.file}${bust}"
                    width="${s.width}"
                    sandbox="allow-same-origin"
                    onload="autoSizeIframe(this)"
                    scrolling="no"
                    style="pointer-events:none; border:none; width:${s.width}px; overflow:hidden;"></iframe>
          </div>
        </div>
      `).join("");
    }

    function autoSizeIframe(iframe) {
      try {
        const doc = iframe.contentDocument || iframe.contentWindow.document;
        const h = doc.documentElement.scrollHeight;
        iframe.style.height = h + "px";
      } catch (e) {}
    }

    applyTransform();
  </script>
</body>
</html>
