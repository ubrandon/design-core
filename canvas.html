<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Canvas — Design Core</title>
  <link rel="stylesheet" href="styles/shared.css">
  <link rel="stylesheet" href="styles/ds.css">
  <link rel="stylesheet" href="styles/canvas-space.css">
  <link rel="stylesheet" href="styles/zoom-controls.css">
  <link rel="stylesheet" href="styles/app.css">
  <style>
    .canvas-card-body { overflow: hidden; max-height: none; }
  </style>
</head>
<body>

  <div id="viewport" class="canvas-space-viewport">
    <div id="stage" class="canvas-space-stage"></div>
  </div>

  <div class="zoom-controls">
    <button class="zoom-btn zoom-btn--tidy" onclick="tidyLayout()" title="Tidy layout">Tidy</button>
    <button class="zoom-btn zoom-btn--tidy" onclick="refreshScreens()" title="Reload screens to see edits">Refresh</button>
    <div class="zoom-controls__zoom-group">
      <button class="zoom-btn" onclick="pz.zoomBy(-0.04)" title="Zoom out">&minus;</button>
      <span id="zoom-label" class="zoom-level">100%</span>
      <button class="zoom-btn" onclick="pz.zoomBy(0.04)" title="Zoom in">+</button>
      <button class="zoom-btn" type="button" onclick="centerOnContent()" title="Center on screens" aria-label="Center on screens">
        <!-- @phosphor-icons/core assets/regular/crosshair.svg (MIT) -->
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="currentColor" aria-hidden="true"><path d="M232,120h-8.34A96.14,96.14,0,0,0,136,32.34V24a8,8,0,0,0-16,0v8.34A96.14,96.14,0,0,0,32.34,120H24a8,8,0,0,0,0,16h8.34A96.14,96.14,0,0,0,120,223.66V232a8,8,0,0,0,16,0v-8.34A96.14,96.14,0,0,0,223.66,136H232a8,8,0,0,0,0-16Zm-96,87.6V200a8,8,0,0,0-16,0v7.6A80.15,80.15,0,0,1,48.4,136H56a8,8,0,0,0,0-16H48.4A80.15,80.15,0,0,1,120,48.4V56a8,8,0,0,0,16,0V48.4A80.15,80.15,0,0,1,207.6,120H200a8,8,0,0,0,0,16h7.6A80.15,80.15,0,0,1,136,207.6ZM128,88a40,40,0,1,0,40,40A40,40,0,0,0,128,88Zm0,64a24,24,0,1,1,24-24A24,24,0,0,1,128,152Z"/></svg>
      </button>
    </div>
  </div>

  <script src="scripts/shared.js"></script>
  <script src="scripts/nav.js"></script>
  <script src="scripts/canvas-pan-zoom.js"></script>
  <script src="scripts/live-reload.js"></script>
  <script>
    const CARD_GAP = 40;
    const DRAG_THRESHOLD = 5;
    /** Stage-space snap when dragging cards (px). */
    const GRID_SNAP = 32;

    function snapToGrid(n) {
      return Math.round(Number(n) / GRID_SNAP) * GRID_SNAP;
    }

    const projectId = getParam("project");
    if (!projectId) {
      try { sessionStorage.setItem("design-core-redirect-hint", "Canvas link was missing a project id."); } catch (_) {}
      window.location.href = "index.html";
    }

    // Paths reported by the live-reload watcher are raw (not URL-encoded), so
    // compare against those with raw strings. Only URL-build sites use this.
    const encProjectId = encodeURIComponent(projectId);
    function screenUrl(file, suffix) {
      return "data/projects/" + encProjectId + "/screens/" + encodeURIComponent(file) + (suffix || "");
    }

    renderNav({
      breadcrumbs: [
        { label: projectId, href: "project.html?id=" + encProjectId, id: "project-link" },
        { label: "Canvas" },
      ],
      fixed: true,
    });

    fetchJSON("data/projects/" + encProjectId + "/project.json")
      .then(data => {
        var link = document.getElementById("project-link");
        if (link) link.textContent = data.name;
        document.title = data.name + " — Canvas — Design Core";
      })
      .catch(() => {});

    const viewport = document.getElementById("viewport");
    const stage = document.getElementById("stage");

    const STORAGE_KEY = "design-core-canvas-" + (projectId || "default");
    let restoreState = null;
    try {
      const s = sessionStorage.getItem(STORAGE_KEY);
      if (s) restoreState = JSON.parse(s);
    } catch (_) {}

    const pz = initPanZoom(viewport, stage, { navHeight: 52, restoreState });

    function savePanZoom() {
      try {
        sessionStorage.setItem(STORAGE_KEY, JSON.stringify({
          panX: pz.panX,
          panY: pz.panY,
          zoom: pz.zoom,
        }));
      } catch (_) {}
    }
    window.addEventListener("pagehide", savePanZoom);

    let screens = [];

    /* ── Selection state ── */
    const selected = new Set();

    function setSelected(indices) {
      selected.clear();
      indices.forEach(i => selected.add(i));
      applySelectionClasses();
      updateSelectionBar();
    }

    function toggleSelected(idx) {
      if (selected.has(idx)) selected.delete(idx); else selected.add(idx);
      applySelectionClasses();
      updateSelectionBar();
    }

    function clearSelection() {
      selected.clear();
      applySelectionClasses();
      updateSelectionBar();
    }

    function applySelectionClasses() {
      screens.forEach((_, i) => {
        const card = document.getElementById("card-" + i);
        if (card) card.classList.toggle("is-selected", selected.has(i));
      });
    }

    /* ── Selection toolbar ── */
    let selectionBar = null;

    function updateSelectionBar() {
      if (selected.size === 0) {
        if (selectionBar) { selectionBar.remove(); selectionBar = null; }
        return;
      }
      if (!selectionBar) {
        selectionBar = document.createElement("div");
        selectionBar.className = "canvas-selection-bar";
        document.body.appendChild(selectionBar);
      }
      const label = selected.size === 1 ? "1 screen" : selected.size + " screens";
      selectionBar.innerHTML =
        '<span class="canvas-selection-bar-label">' + label + ' selected</span>' +
        '<button class="canvas-selection-bar-btn" onclick="deleteSelected()">' +
        '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>' +
        'Delete</button>';
    }

    /* ── Delete selected screens ── */
    function deleteSelected() {
      if (selected.size === 0) return;
      const indices = Array.from(selected).sort((a, b) => b - a);
      const filesToDelete = indices.map(i => screens[i].file);
      indices.forEach(i => screens.splice(i, 1));
      clearSelection();
      renderCards();
      saveCanvas();
      let failures = 0;
      Promise.all(filesToDelete.map(f =>
        fetch(screenUrl(f), { method: "DELETE" })
          .then(r => { if (!r.ok) failures++; })
          .catch(() => { failures++; }),
      )).then(() => {
        if (failures > 0) {
          showToast(
            failures === 1
              ? "1 screen file could not be deleted on disk"
              : `${failures} screen files could not be deleted on disk`,
          );
        }
      });
    }

    function saveCanvas() {
      const payload = { screens: screens.map(s => ({ file: s.file, x: Math.round(s.x), y: Math.round(s.y), width: s.width })) };
      fetch("data/projects/" + encProjectId + "/canvas.json", {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload, null, 2),
      }).catch(() => {});
    }

    /* ── Keyboard shortcuts ── */
    window.addEventListener("keydown", function (e) {
      if (e.key === "Delete" || e.key === "Backspace") {
        if (selected.size > 0 && !e.target.closest("input, textarea, [contenteditable]")) {
          e.preventDefault();
          deleteSelected();
        }
      }
      if ((e.key === "a" || e.key === "A") && (e.metaKey || e.ctrlKey)) {
        if (!e.target.closest("input, textarea, [contenteditable]")) {
          e.preventDefault();
          setSelected(screens.map((_, i) => i));
        }
      }
      if (e.key === "Escape") {
        closeContextMenu();
        clearSelection();
      }
    });

    /* ── Right-click context menu ── */
    let ctxMenu = null;

    function closeContextMenu() {
      if (ctxMenu) { ctxMenu.remove(); ctxMenu = null; }
      window.removeEventListener("pointerdown", onCtxOutside);
    }

    function onCtxOutside(e) {
      if (ctxMenu && !ctxMenu.contains(e.target)) closeContextMenu();
    }

    function showContextMenu(x, y, items) {
      closeContextMenu();
      ctxMenu = document.createElement("div");
      ctxMenu.className = "canvas-context-menu";
      for (const item of items) {
        if (item.sep) {
          const sep = document.createElement("div");
          sep.className = "canvas-context-menu-sep";
          ctxMenu.appendChild(sep);
          continue;
        }
        const btn = document.createElement("button");
        btn.className = "canvas-context-menu-item" + (item.danger ? " canvas-context-menu-item--danger" : "");
        // Icons are trusted constants in this file; the label may contain a
        // file name, so append it as text to avoid HTML injection.
        if (item.icon) {
          const iconWrap = document.createElement("span");
          iconWrap.innerHTML = item.icon;
          btn.appendChild(iconWrap);
        }
        btn.appendChild(document.createTextNode(item.label));
        btn.addEventListener("click", () => { closeContextMenu(); item.action(); });
        ctxMenu.appendChild(btn);
      }
      ctxMenu.style.left = x + "px";
      ctxMenu.style.top = y + "px";
      document.body.appendChild(ctxMenu);

      const rect = ctxMenu.getBoundingClientRect();
      if (rect.right > window.innerWidth) ctxMenu.style.left = (x - rect.width) + "px";
      if (rect.bottom > window.innerHeight) ctxMenu.style.top = (y - rect.height) + "px";

      setTimeout(() => window.addEventListener("pointerdown", onCtxOutside), 0);
    }

    const ICON_SELECT = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3h7v7H3zM14 3h7v7h-7zM3 14h7v7H3zM14 14h7v7h-7z"/></svg>';
    const ICON_TIDY = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>';
    const ICON_DELETE = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>';

    viewport.addEventListener("contextmenu", (e) => {
      e.preventDefault();
      const card = e.target.closest(".canvas-card");

      if (card) {
        const idx = parseInt(card.id.replace("card-", ""), 10);
        if (isNaN(idx)) return;
        if (!selected.has(idx)) setSelected([idx]);

        const count = selected.size;
        const label = count === 1 ? screens[idx].file.replace(".html", "") : count + " screens";
        showContextMenu(e.clientX, e.clientY, [
          { label: "Select All", icon: ICON_SELECT, action: () => setSelected(screens.map((_, i) => i)) },
          { sep: true },
          { label: "Tidy Layout", icon: ICON_TIDY, action: tidyLayout },
          { sep: true },
          { label: "Delete " + label, icon: ICON_DELETE, danger: true, action: deleteSelected },
        ]);
      } else {
        clearSelection();
        showContextMenu(e.clientX, e.clientY, [
          { label: "Select All", icon: ICON_SELECT, action: () => setSelected(screens.map((_, i) => i)) },
          { sep: true },
          { label: "Tidy Layout", icon: ICON_TIDY, action: tidyLayout },
        ]);
      }
    });

    /* ── Card click/drag + marquee + deselect ── */
    let cardPointer = null;
    let marquee = null;
    let marqueeEl = null;

    function onCardPointerDown(e, idx) {
      if (e.button !== 0) return;
      if (pz.spaceHeld) return;
      e.stopPropagation();
      e.preventDefault();
      closeContextMenu();

      const shiftHeld = e.shiftKey;

      if (shiftHeld) {
        const next = new Set(selected);
        if (next.has(idx)) next.delete(idx); else next.add(idx);
        setSelected([...next]);
      } else if (!selected.has(idx)) {
        setSelected([idx]);
      }

      cardPointer = {
        idx,
        startX: e.clientX,
        startY: e.clientY,
        moved: false,
        shiftHeld,
        dragOffsets: null,
        pointerId: e.pointerId,
      };
      viewport.setPointerCapture(e.pointerId);
    }

    viewport.addEventListener("pointerdown", (e) => {
      if (e.button !== 0) return;
      if (pz.spaceHeld) return;
      if (e.target.closest(".canvas-card")) return;

      if (e.ctrlKey || e.metaKey) {
        e.preventDefault();
        e.stopPropagation();
        marquee = {
          startX: e.clientX,
          startY: e.clientY,
          moved: false,
          pointerId: e.pointerId,
        };
        viewport.setPointerCapture(e.pointerId);
      } else {
        closeContextMenu();
        clearSelection();
      }
    });

    function releaseViewportCaptureSafe(pointerId) {
      try {
        if (pointerId != null && viewport.releasePointerCapture) {
          viewport.releasePointerCapture(pointerId);
        }
      } catch (_) {}
    }

    function endCanvasPointerSession(e) {
      const pid = e.pointerId;
      if (cardPointer && cardPointer.pointerId === pid) {
        if (cardPointer.moved) {
          viewport.classList.remove("dragging-card");
          saveCanvas();
        } else if (!cardPointer.shiftHeld) {
          setSelected([cardPointer.idx]);
        }
        cardPointer = null;
        releaseViewportCaptureSafe(pid);
        return true;
      }
      if (marquee && marquee.pointerId === pid) {
        if (marqueeEl) { marqueeEl.remove(); marqueeEl = null; }
        marquee = null;
        releaseViewportCaptureSafe(pid);
        return true;
      }
      return false;
    }

    viewport.addEventListener("pointermove", (e) => {
      if (cardPointer && e.pointerId === cardPointer.pointerId) {
        const dx = e.clientX - cardPointer.startX;
        const dy = e.clientY - cardPointer.startY;
        if (!cardPointer.moved && Math.abs(dx) < DRAG_THRESHOLD && Math.abs(dy) < DRAG_THRESHOLD) return;

        if (!cardPointer.moved) {
          cardPointer.moved = true;
          viewport.classList.add("dragging-card");

          const rect = viewport.getBoundingClientRect();
          const sX = (cardPointer.startX - rect.left - pz.panX - rect.width / 2) / pz.zoom;
          const sY = (cardPointer.startY - rect.top - pz.panY - rect.height / 2 + 52) / pz.zoom;

          cardPointer.dragOffsets = [];
          selected.forEach(i => {
            cardPointer.dragOffsets.push({ idx: i, offX: sX - screens[i].x, offY: sY - screens[i].y });
          });
        }

        const rect = viewport.getBoundingClientRect();
        const stageX = (e.clientX - rect.left - pz.panX - rect.width / 2) / pz.zoom;
        const stageY = (e.clientY - rect.top - pz.panY - rect.height / 2 + 52) / pz.zoom;

        cardPointer.dragOffsets.forEach(d => {
          const s = screens[d.idx];
          s.x = snapToGrid(stageX - d.offX);
          s.y = snapToGrid(stageY - d.offY);
          const el = document.getElementById("card-" + d.idx);
          if (el) {
            el.style.left = s.x + "px";
            el.style.top = s.y + "px";
          }
        });
        return;
      }

      if (marquee && e.pointerId === marquee.pointerId) {
        const dx = e.clientX - marquee.startX;
        const dy = e.clientY - marquee.startY;
        if (!marquee.moved && Math.abs(dx) < DRAG_THRESHOLD && Math.abs(dy) < DRAG_THRESHOLD) return;

        if (!marquee.moved) {
          marquee.moved = true;
          pz.isPanning = false;
          marqueeEl = document.createElement("div");
          marqueeEl.className = "canvas-marquee";
          document.body.appendChild(marqueeEl);
        }

        const x = Math.min(marquee.startX, e.clientX);
        const y = Math.min(marquee.startY, e.clientY);
        const w = Math.abs(dx);
        const h = Math.abs(dy);
        marqueeEl.style.left = x + "px";
        marqueeEl.style.top = y + "px";
        marqueeEl.style.width = w + "px";
        marqueeEl.style.height = h + "px";

        const hits = [];
        screens.forEach((s, i) => {
          const card = document.getElementById("card-" + i);
          if (card) {
            const cr = card.getBoundingClientRect();
            if (cr.right > x && cr.left < x + w && cr.bottom > y && cr.top < y + h) {
              hits.push(i);
            }
          }
        });
        setSelected(hits);
      }
    });

    viewport.addEventListener("pointerup", (e) => {
      if (endCanvasPointerSession(e)) return;

      if (!pz.didPan && !e.target.closest(".canvas-card") && !e.target.closest(".canvas-context-menu")) {
        clearSelection();
      }
    });

    viewport.addEventListener("pointercancel", (e) => {
      endCanvasPointerSession(e);
    });

    viewport.addEventListener("lostpointercapture", (e) => {
      if (cardPointer && cardPointer.pointerId === e.pointerId) {
        if (cardPointer.moved) {
          viewport.classList.remove("dragging-card");
          saveCanvas();
        } else if (!cardPointer.shiftHeld) {
          setSelected([cardPointer.idx]);
        }
        cardPointer = null;
      }
      if (marquee && marquee.pointerId === e.pointerId) {
        if (marqueeEl) { marqueeEl.remove(); marqueeEl = null; }
        marquee = null;
      }
    });

    /* ── Canvas data ── */

    function tidyLayout() {
      let x = 0;
      screens.forEach((s, i) => {
        const card = document.getElementById("card-" + i);
        const w = s.width || 390;
        s.x = snapToGrid(x);
        s.y = snapToGrid(0);
        if (card) {
          card.style.left = s.x + "px";
          card.style.top = s.y + "px";
        }
        x += w + CARD_GAP;
      });
    }

    function getScreensBounds() {
      if (!screens.length) return null;
      let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
      for (let i = 0; i < screens.length; i++) {
        const s = screens[i];
        const w = s.width || 390;
        const card = document.getElementById("card-" + i);
        // Cards start with tiny iframes until the inner doc loads, so fall back
        // to a mobile-ish aspect ratio so initial centering frames the content.
        const measured = card ? card.offsetHeight : 0;
        const h = measured > 200 ? measured : Math.round(w * 2.16);
        if (s.x < minX) minX = s.x;
        if (s.y < minY) minY = s.y;
        if (s.x + w > maxX) maxX = s.x + w;
        if (s.y + h > maxY) maxY = s.y + h;
      }
      return { minX, minY, maxX, maxY };
    }

    /** Frame a bounds rect inside the viewport and apply the pan/zoom. */
    function frameBounds(b, margin) {
      const rect = viewport.getBoundingClientRect();
      const m = margin == null ? 60 : margin;
      const contentW = Math.max(1, b.maxX - b.minX);
      const contentH = Math.max(1, b.maxY - b.minY);
      const zX = (rect.width - m * 2) / contentW;
      const zY = (rect.height - m * 2) / contentH;
      let z = Math.min(zX, zY, 1);
      z = Math.max(0.2, Math.min(2, z));
      const cx = (b.minX + b.maxX) / 2;
      const cy = (b.minY + b.maxY) / 2;
      pz.zoom = z;
      pz.panX = -cx * z;
      pz.panY = -cy * z;
      pz.applyTransform();
    }

    /** Frame all screens inside the viewport. The stage's (0,0) is CSS-positioned
     *  at the viewport center, so panning by (-cx*z, -cy*z) lands the content
     *  center at the viewport center. */
    function centerOnContent() {
      const b = getScreensBounds();
      if (!b) {
        pz.zoom = 1;
        pz.panX = 0;
        pz.panY = 0;
        pz.applyTransform();
        return;
      }
      frameBounds(b, 60);
    }

    /** Frame a single screen by its file name. Returns true if the screen was found. */
    function centerOnScreen(file) {
      const idx = screens.findIndex((s) => s.file === file);
      if (idx < 0) return false;
      const s = screens[idx];
      const w = s.width || 390;
      const card = document.getElementById("card-" + idx);
      const measured = card ? card.offsetHeight : 0;
      const h = measured > 200 ? measured : Math.round(w * 2.16);
      frameBounds({ minX: s.x, minY: s.y, maxX: s.x + w, maxY: s.y + h }, 40);
      return true;
    }

    function loadCanvas(changedFiles) {
      return fetch("data/projects/" + encProjectId + "/canvas.json?t=" + Date.now())
        .then(r => {
          if (!r.ok) throw new Error(r.status);
          return r.json();
        })
        .then(data => {
          let autoX = 0;
          const next = data.screens.map((s) => {
            const w = s.width || 390;
            const x = s.x != null ? s.x : autoX;
            const y = s.y != null ? s.y : 0;
            autoX = x + w + CARD_GAP;
            return { file: s.file, x, y, width: w };
          });
          const structureSame = screens.length === next.length && next.every((n, i) =>
            screens[i] && n.file === screens[i].file && n.width === screens[i].width
          );
          if (!structureSame) {
            screens = next;
            renderCards();
            var empty = document.getElementById("canvas-empty");
            if (empty) empty.remove();
          } else if (changedFiles && changedFiles.length) {
            reloadChangedIframes(changedFiles);
          }
        })
        .catch(() => {
          if (!screens.length) {
            stage.innerHTML = "";
            var existing = document.getElementById("canvas-empty");
            if (!existing) {
              var el = document.createElement("div");
              el.id = "canvas-empty";
              el.style.cssText = "position:fixed;inset:0;top:52px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;pointer-events:none;z-index:10;";
              el.innerHTML = '<div style="font-size:1.1rem;font-weight:800;color:rgba(0,0,0,0.55);margin-bottom:8px;">No screens yet</div><div style="font-size:0.9rem;color:rgba(0,0,0,0.4);line-height:1.55;max-width:340px;">Ask the AI to create screens for this project — describe the UI you want to explore.</div>';
              document.body.appendChild(el);
            }
          }
        });
    }

    function reloadChangedIframes(changedFiles) {
      // Watcher paths are raw (unencoded) — compare raw, then build encoded URL.
      const rawPrefix = "data/projects/" + projectId + "/screens/";
      const bust = "?t=" + Date.now();
      screens.forEach((s, i) => {
        const fullPath = rawPrefix + s.file;
        if (changedFiles.some(f => f === fullPath)) {
          const card = document.getElementById("card-" + i);
          if (!card) return;
          const iframe = card.querySelector("iframe");
          if (iframe) {
            iframe.src = screenUrl(s.file, bust);
          }
        }
      });
    }

    function refreshScreens() {
      screens = [];
      clearSelection();
      const btn = document.querySelector('[onclick="refreshScreens()"]');
      if (btn) { btn.disabled = true; }
      loadCanvas().then(() => {
        if (btn) {
          btn.textContent = "✓ Refresh";
          btn.disabled = false;
          setTimeout(() => { btn.textContent = "Refresh"; }, 1500);
        }
      });
    }

    // An explicit ?screen=<file> deep-link always wins over the saved session
    // view — otherwise clicking a preview card could land on a different spot.
    const deepLinkScreen = getParam("screen");

    loadCanvas().then(() => {
      const applyInitialFrame = () => {
        if (deepLinkScreen && centerOnScreen(deepLinkScreen)) return;
        if (restoreState) return;
        centerOnContent();
      };

      // First frame uses a fallback height; refine once the iframes report their
      // real size so the initial zoom isn't skewed by the 150px default.
      applyInitialFrame();
      const iframes = stage.querySelectorAll("iframe");
      let pending = iframes.length;
      if (!pending) return;
      let finalized = false;
      const finalize = () => {
        if (finalized) return;
        finalized = true;
        applyInitialFrame();
      };
      iframes.forEach((f) => {
        f.addEventListener("load", () => {
          if (--pending <= 0) finalize();
        }, { once: true });
      });
      // Guard in case some iframes never fire load (e.g. cached errors).
      setTimeout(finalize, 1500);
    });

    /* ── Live reload ── */
    window.__onDataChanged = function(paths) {
      const prefix = "data/projects/" + projectId + "/";
      const relevant = paths.filter(p => p.startsWith(prefix));
      if (!relevant.length && paths.length > 0) return;

      const canvasJsonChanged = relevant.some(p => p === prefix + "canvas.json");
      const screenFiles = relevant.filter(p => p.startsWith(prefix + "screens/"));

      if (canvasJsonChanged || relevant.length === 0) {
        loadCanvas(screenFiles);
      } else if (screenFiles.length) {
        reloadChangedIframes(screenFiles);
      }
    };

    function renderCards() {
      const bust = "?t=" + Date.now();
      stage.innerHTML = screens.map((s, i) => `
        <div class="canvas-card${selected.has(i) ? " is-selected" : ""}" id="card-${i}"
             style="left:${s.x}px; top:${s.y}px; width:${s.width}px;">
          <div class="canvas-card-body">
            <iframe src="${screenUrl(s.file, bust)}"
                    width="${s.width}"
                    sandbox="allow-same-origin"
                    onload="autoSizeIframe(this)"
                    scrolling="no"
                    style="pointer-events:none; border:none; width:${s.width}px; overflow:hidden;"></iframe>
          </div>
        </div>
      `).join("");

      stage.querySelectorAll(".canvas-card").forEach((card, i) => {
        card.addEventListener("pointerdown", (e) => onCardPointerDown(e, i));
      });
    }

    function autoSizeIframe(iframe) {
      try {
        const doc = iframe.contentDocument || iframe.contentWindow.document;
        iframe.style.height = doc.documentElement.scrollHeight + "px";
      } catch (e) {}
    }
  </script>
</body>
</html>
