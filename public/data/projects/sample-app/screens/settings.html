<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../../../../styles/shared.css">
  <link rel="stylesheet" href="../../../../styles/ds.css">
  <style>
    body { margin: 0; }
    .settings-section-label {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted-2);
      padding: 0 4px;
      margin-bottom: 8px;
    }
    .ds-list-item-trailing {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--muted-2);
      white-space: nowrap;
    }
    .signout-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 14px 18px;
      border-radius: 9999px;
      border: 1px solid rgba(239, 68, 68, 0.2);
      background: rgba(239, 68, 68, 0.06);
      color: #dc2626;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div style="padding: 16px; width: 100%; max-width: 390px; margin: 0 auto; background: var(--bg-0); border-radius: var(--radius-lg);">

    <!-- Nav bar -->
    <div class="ds-nav-bar" style="border-bottom: none; padding: 0; margin-bottom: 16px;">
      <button class="ds-nav-bar-back">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5"/></svg>
        Back
      </button>
    </div>

    <h1 style="font-size: 1.6rem; font-weight: 900; letter-spacing: -0.03em; color: var(--text); margin-bottom: 24px;">Settings</h1>

    <!-- Account Section -->
    <section style="margin-bottom: 24px;">
      <div class="settings-section-label">Account</div>
      <div class="ds-list">
        <div class="ds-list-item">
          <div class="ds-list-item-icon">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" style="width: 18px; height: 18px;"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z"/></svg>
          </div>
          <div class="ds-list-item-content">
            <div class="ds-list-item-label">Profile</div>
          </div>
          <svg class="ds-list-item-chevron" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5"/></svg>
        </div>
        <div class="ds-list-item">
          <div class="ds-list-item-icon">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" style="width: 18px; height: 18px;"><path stroke-linecap="round" stroke-linejoin="round" d="M14.857 17.082a23.848 23.848 0 005.454-1.31A8.967 8.967 0 0118 9.75v-.7V9A6 6 0 006 9v.75a8.967 8.967 0 01-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 01-5.714 0m5.714 0a3 3 0 11-5.714 0"/></svg>
          </div>
          <div class="ds-list-item-content">
            <div class="ds-list-item-label">Notifications</div>
          </div>
          <span class="ds-badge ds-badge-red">3</span>
          <svg class="ds-list-item-chevron" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" style="margin-left: 8px;"><path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5"/></svg>
        </div>
        <div class="ds-list-item">
          <div class="ds-list-item-icon">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" style="width: 18px; height: 18px;"><path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z"/></svg>
          </div>
          <div class="ds-list-item-content">
            <div class="ds-list-item-label">Privacy</div>
          </div>
          <svg class="ds-list-item-chevron" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5"/></svg>
        </div>
      </div>
    </section>

    <!-- Preferences Section -->
    <section style="margin-bottom: 24px;">
      <div class="settings-section-label">Preferences</div>
      <div class="ds-list">
        <div class="ds-list-item">
          <div class="ds-list-item-icon" style="background: rgba(var(--neon-teal-rgb), 0.08); color: var(--neon-teal);">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" style="width: 18px; height: 18px;"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386l-1.591 1.591M21 12h-2.25m-.386 6.364l-1.591-1.591M12 18.75V21m-4.773-4.227l-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0z"/></svg>
          </div>
          <div class="ds-list-item-content">
            <div class="ds-list-item-label">Appearance</div>
          </div>
          <span class="ds-list-item-trailing">Light</span>
          <svg class="ds-list-item-chevron" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" style="margin-left: 8px;"><path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5"/></svg>
        </div>
        <div class="ds-list-item">
          <div class="ds-list-item-icon" style="background: rgba(var(--neon-teal-rgb), 0.08); color: var(--neon-teal);">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" style="width: 18px; height: 18px;"><path stroke-linecap="round" stroke-linejoin="round" d="M10.5 21l5.25-11.25L21 21m-9-3h7.5M3 5.621a48.474 48.474 0 016-.371m0 0c1.12 0 2.233.038 3.334.114M9 5.25V3m3.334 2.364C11.176 10.658 7.69 15.08 3 17.502m9.334-12.138c.896.061 1.785.147 2.666.257m-4.589 8.495a18.023 18.023 0 01-3.827-5.802"/></svg>
          </div>
          <div class="ds-list-item-content">
            <div class="ds-list-item-label">Language</div>
          </div>
          <span class="ds-list-item-trailing">English</span>
          <svg class="ds-list-item-chevron" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" style="margin-left: 8px;"><path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5"/></svg>
        </div>
        <div class="ds-list-item">
          <div class="ds-list-item-icon" style="background: rgba(var(--neon-teal-rgb), 0.08); color: var(--neon-teal);">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" style="width: 18px; height: 18px;"><path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1115 0z"/></svg>
          </div>
          <div class="ds-list-item-content">
            <div class="ds-list-item-label">Location</div>
          </div>
          <button class="ds-toggle is-on" aria-label="Location toggle"></button>
        </div>
      </div>
    </section>

    <!-- About Section -->
    <section style="margin-bottom: 28px;">
      <div class="settings-section-label">About</div>
      <div class="ds-list">
        <div class="ds-list-item">
          <div class="ds-list-item-icon" style="background: rgba(0, 0, 0, 0.04); color: var(--muted);">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" style="width: 18px; height: 18px;"><path stroke-linecap="round" stroke-linejoin="round" d="M9.879 7.519c1.171-1.025 3.071-1.025 4.242 0 1.172 1.025 1.172 2.687 0 3.712-.203.179-.43.326-.67.442-.745.361-1.45.999-1.45 1.827v.75M21 12a9 9 0 11-18 0 9 9 0 0118 0zm-9 5.25h.008v.008H12v-.008z"/></svg>
          </div>
          <div class="ds-list-item-content">
            <div class="ds-list-item-label">Help</div>
          </div>
          <svg class="ds-list-item-chevron" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5"/></svg>
        </div>
        <div class="ds-list-item">
          <div class="ds-list-item-icon" style="background: rgba(0, 0, 0, 0.04); color: var(--muted);">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" style="width: 18px; height: 18px;"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/></svg>
          </div>
          <div class="ds-list-item-content">
            <div class="ds-list-item-label">Terms of Service</div>
          </div>
          <svg class="ds-list-item-chevron" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5"/></svg>
        </div>
        <div class="ds-list-item">
          <div class="ds-list-item-icon" style="background: rgba(0, 0, 0, 0.04); color: var(--muted);">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" style="width: 18px; height: 18px;"><path stroke-linecap="round" stroke-linejoin="round" d="M11.25 11.25l.041-.02a.75.75 0 011.063.852l-.708 2.836a.75.75 0 001.063.853l.041-.021M21 12a9 9 0 11-18 0 9 9 0 0118 0zm-9-3.75h.008v.008H12V8.25z"/></svg>
          </div>
          <div class="ds-list-item-content">
            <div class="ds-list-item-label">Version</div>
          </div>
          <span class="ds-list-item-trailing">2.1.0</span>
        </div>
      </div>
    </section>

    <!-- Sign Out -->
    <button class="signout-btn">Sign Out</button>

  </div>
</body>
</html>
