<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../../../../styles/shared.css">
  <link rel="stylesheet" href="../../../../styles/ds.css">
  <style>
    body { margin: 0; }
    .home-avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(var(--neon-blue-rgb), 0.15), rgba(var(--neon-teal-rgb), 0.15));
      border: 2px solid rgba(var(--neon-blue-rgb), 0.25);
      display: grid;
      place-items: center;
      font-size: 0.85rem;
      font-weight: 800;
      color: var(--neon-blue);
    }
  </style>
</head>
<body>
  <div style="padding: 16px; width: 100%; max-width: 390px; margin: 0 auto; background: var(--bg-0); border-radius: var(--radius-lg);">

    <!-- Header -->
    <header class="ds-home-header">
      <div>
        <div style="font-size: 0.78rem; font-weight: 600; color: var(--muted); margin-bottom: 2px;">Good morning</div>
        <h1>Hello, Alex</h1>
      </div>
      <div class="home-avatar">AJ</div>
    </header>

    <!-- Search -->
    <div class="ds-search-bar" style="margin-bottom: 20px;">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z"/></svg>
      <input type="text" placeholder="Search plans, people, places…" readonly>
    </div>

    <!-- Recent Activity -->
    <section style="margin-bottom: 24px;">
      <h2 class="ds-section-title">Recent Activity</h2>
      <div class="ds-recent-activity">
        <div class="ds-recent-item">
          <div class="ds-recent-avatar" style="border-color: rgba(var(--neon-teal-rgb), 0.4);">
            <img src="https://i.pravatar.cc/80?img=5" alt="">
            <span class="ds-recent-count">2</span>
          </div>
          <span class="ds-recent-name">Maya</span>
          <span class="ds-recent-detail">Just now</span>
        </div>
        <div class="ds-recent-item">
          <div class="ds-recent-avatar" style="border-color: rgba(var(--neon-blue-rgb), 0.4);">
            <img src="https://i.pravatar.cc/80?img=11" alt="">
          </div>
          <span class="ds-recent-name">Chris</span>
          <span class="ds-recent-detail">5 min</span>
        </div>
        <div class="ds-recent-item">
          <div class="ds-recent-avatar">
            <img src="https://i.pravatar.cc/80?img=32" alt="">
          </div>
          <span class="ds-recent-name">Jordan</span>
          <span class="ds-recent-detail">12 min</span>
        </div>
        <div class="ds-recent-item">
          <div class="ds-recent-avatar">
            <img src="https://i.pravatar.cc/80?img=47" alt="">
          </div>
          <span class="ds-recent-name">Sam</span>
          <span class="ds-recent-detail">1 hr</span>
        </div>
        <div class="ds-recent-item">
          <div class="ds-recent-avatar">
            <img src="https://i.pravatar.cc/80?img=60" alt="">
          </div>
          <span class="ds-recent-name">Riley</span>
          <span class="ds-recent-detail">3 hr</span>
        </div>
      </div>
    </section>

    <!-- Category Chips -->
    <section style="margin-bottom: 20px;">
      <div class="ds-chip-row">
        <button class="ds-chip is-active">All</button>
        <button class="ds-chip">Outdoors</button>
        <button class="ds-chip">Food</button>
        <button class="ds-chip">Social</button>
        <button class="ds-chip">Fitness</button>
      </div>
    </section>

    <!-- Your Plans -->
    <section>
      <h2 class="ds-section-title">Your Plans</h2>
      <div class="ds-plan-rows">

        <div class="ds-plan-row">
          <div class="ds-plan-row-media" style="background-image: url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=400&h=300&q=80');"></div>
          <div class="ds-plan-row-content">
            <div class="ds-plan-row-top">
              <span class="ds-plan-row-time">Sat, Mar 21 · 8:00 AM</span>
            </div>
            <div class="ds-plan-row-title">Sunrise Hike</div>
            <div class="ds-plan-row-meta">
              <span class="ds-meta-row">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1115 0z"/></svg>
                Blue Ridge Trail
              </span>
              <div class="ds-avatar-stack">
                <img src="https://i.pravatar.cc/44?img=5" alt="">
                <img src="https://i.pravatar.cc/44?img=11" alt="">
                <img src="https://i.pravatar.cc/44?img=32" alt="">
                <span class="ds-avatar-count">+2</span>
              </div>
            </div>
          </div>
        </div>

        <div class="ds-plan-row">
          <div class="ds-plan-row-media" style="background-image: url('https://images.unsplash.com/photo-1509042239860-f550ce710b93?auto=format&fit=crop&w=400&h=300&q=80');"></div>
          <div class="ds-plan-row-content">
            <div class="ds-plan-row-top">
              <span class="ds-plan-row-time">Sun, Mar 22 · 10:30 AM</span>
              <span class="ds-plan-row-badge ds-badge-gold">New</span>
            </div>
            <div class="ds-plan-row-title">Coffee & Catch-up</div>
            <div class="ds-plan-row-meta">
              <span class="ds-meta-row">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1115 0z"/></svg>
                Ritual Coffee
              </span>
              <div class="ds-avatar-stack">
                <img src="https://i.pravatar.cc/44?img=47" alt="">
                <img src="https://i.pravatar.cc/44?img=60" alt="">
              </div>
            </div>
          </div>
        </div>

        <div class="ds-plan-row">
          <div class="ds-plan-row-media" style="background-image: url('https://images.unsplash.com/photo-1504674900247-0877df9cc836?auto=format&fit=crop&w=400&h=300&q=80');"></div>
          <div class="ds-plan-row-content">
            <div class="ds-plan-row-top">
              <span class="ds-plan-row-time">Tue, Mar 24 · 7:00 PM</span>
            </div>
            <div class="ds-plan-row-title">Taco Tuesday</div>
            <div class="ds-plan-row-meta">
              <span class="ds-meta-row">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1115 0z"/></svg>
                El Mercado
              </span>
              <div class="ds-avatar-stack">
                <img src="https://i.pravatar.cc/44?img=5" alt="">
                <img src="https://i.pravatar.cc/44?img=32" alt="">
                <img src="https://i.pravatar.cc/44?img=11" alt="">
                <img src="https://i.pravatar.cc/44?img=47" alt="">
                <span class="ds-avatar-count">+4</span>
              </div>
            </div>
          </div>
        </div>

      </div>
    </section>

    <!-- Tab Bar -->
    <div class="ds-tab-bar" style="margin: 24px -16px -16px; border-radius: 0 0 var(--radius-lg) var(--radius-lg);">
      <button class="ds-tab-item is-active">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12l8.954-8.955a1.126 1.126 0 011.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25"/></svg>
        Home
      </button>
      <button class="ds-tab-item">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z"/></svg>
        Discover
      </button>
      <button class="ds-tab-item">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M14.857 17.082a23.848 23.848 0 005.454-1.31A8.967 8.967 0 0118 9.75v-.7V9A6 6 0 006 9v.75a8.967 8.967 0 01-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 01-5.714 0m5.714 0a3 3 0 11-5.714 0"/></svg>
        Alerts
      </button>
      <button class="ds-tab-item">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z"/></svg>
        Profile
      </button>
    </div>

  </div>
</body>
</html>
