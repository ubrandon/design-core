<div style="display:grid;grid-template-columns:repeat(4, 1fr);gap:12px;">
  <div style="display:flex;flex-direction:column;align-items:center;gap:4px;">
    <div style="width:56px;height:56px;border-radius:10px;background:var(--jh-navy);"></div>
    <span style="font-size:0.65rem;font-weight:700;color:rgba(0,0,0,0.45);"><strong>Navy</strong> #1e3a5f</span>
  </div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:4px;">
    <div style="width:56px;height:56px;border-radius:10px;background:var(--jh-blue);"></div>
    <span style="font-size:0.65rem;font-weight:700;color:rgba(0,0,0,0.45);"><strong>Primary</strong> #2563eb</span>
  </div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:4px;">
    <div style="width:56px;height:56px;border-radius:10px;background:var(--jh-green);"></div>
    <span style="font-size:0.65rem;font-weight:700;color:rgba(0,0,0,0.45);"><strong>Positive</strong> #16a34a</span>
  </div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:4px;">
    <div style="width:56px;height:56px;border-radius:10px;background:var(--jh-red);"></div>
    <span style="font-size:0.65rem;font-weight:700;color:rgba(0,0,0,0.45);"><strong>Alert</strong> #ef4444</span>
  </div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:4px;">
    <div style="width:56px;height:56px;border-radius:10px;background:var(--bg-1);border:1px solid rgba(0,0,0,0.1);"></div>
    <span style="font-size:0.65rem;font-weight:700;color:rgba(0,0,0,0.45);"><strong>Surface</strong> #f8f9fb</span>
  </div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:4px;">
    <div style="width:56px;height:56px;border-radius:10px;background:var(--bg-0);border:1px solid rgba(0,0,0,0.1);"></div>
    <span style="font-size:0.65rem;font-weight:700;color:rgba(0,0,0,0.45);"><strong>White</strong> #ffffff</span>
  </div>
</div>
